<section class="glossary-form-page">
  <h1 class="glossary-form-page__title">
    {{ isEditMode() ? 'Редактирование статьи' : 'Создание статьи' }}
  </h1>

  <form
    class="form"
    [formGroup]="form"
    (ngSubmit)="onSubmit()"
  >
    <div class="form__group">
      <label
        class="form__label"
        for="category"
      >
        Раздел (category)
      </label>
      <input
        class="form__input"
        id="category"
        type="text"
        formControlName="category"
        placeholder="Например: Психология эмоций"
      />
    </div>

    <div class="form__group">
      <label
        class="form__label"
        for="title"
      >
        Заголовок (title)
      </label>
      <input
        class="form__input"
        type="text"
        id="title"
        formControlName="title"
        placeholder="Например: Понятие эмоций"
      />
    </div>

    <div class="form__group">
      <label
        class="form__label"
        for="leadText"
      >
        Вводный текст (leadText)
      </label>
      <textarea
        class="form__textarea"
        id="leadText"
        formControlName="leadText"
        placeholder="Краткое описание сути статьи..."
      ></textarea>
    </div>

    <div class="form__group">
      <label
        class="form__label"
        for="noteText"
      >
        Примечание (noteText) — опционально
      </label>
      <textarea
        class="form__textarea"
        id="noteText"
        formControlName="noteText"
        placeholder="Текст интерактивного блока..."
      ></textarea>
    </div>

    <div class="form__group">
      <label
        class="form__label"
        for="sectionTitle"
      >
        Заголовок секции функций (sectionTitle)
      </label>
      <input
        class="form__input"
        type="text"
        id="sectionTitle"
        formControlName="sectionTitle"
        placeholder="Например: Основные функции эмоций"
      />
    </div>

    <div
      class="form__section"
      formArrayName="features"
    >
      <h3 class="form__section-title">Список функций (features)</h3>

      @for (featureForm of featuresFormArray.controls; track $index) {
        <div
          class="form__row"
          [formGroupName]="$index"
        >
          <input
            class="form__input"
            type="text"
            formControlName="title"
            placeholder="Название (Сигнальная)"
          />
          <input
            class="form__input"
            type="text"
            formControlName="text"
            placeholder="Описание функции..."
          />
        </div>
      }
      <button
        class="button button--add"
        type="button"
        (click)="addFeature()"
      >
        + Добавить функцию
      </button>
    </div>

    <div
      class="form__section"
      formArrayName="toc"
    >
      <h3 class="form__section-title">Правое оглавление (toc)</h3>

      @for (tocForm of tocFormArray.controls; track $index) {
        <div
          class="form__row form__row--three"
          [formGroupName]="$index"
        >
          <input
            class="form__input"
            type="text"
            formControlName="id"
            placeholder="ID (definition)"
          />
          <input
            class="form__input"
            type="text"
            formControlName="label"
            placeholder="Текст (Что такое...)"
          />
          <input
            class="form__input"
            type="text"
            formControlName="anchor"
            placeholder="Якорь (#definition)"
          />
        </div>
      }
      <button
        class="button button--add"
        type="button"
        (click)="addTocElement()"
      >
        + Добавить пункт меню
      </button>
    </div>

    <div class="form__actions">
      <button
        class="button button--submit"
        type="submit"
      >
        Сохранить
      </button>
      <a
        class="button button--cancel"
        routerLink="/glossary/emotions"
      >
        Отмена
      </a>
    </div>
  </form>
</section>
