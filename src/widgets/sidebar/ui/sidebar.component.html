<aside class="sidebar">
  <div class="sidebar__container">
    @for (section of sections(); track section.title) {
      <div class="sidebar__section">
        <h4 class="sidebar__section-title">{{ section.title }}</h4>

        <app-s-navigation
          [elements]="section.items"
          orientation="vertical"
        />
      </div>
    }
  </div>
</aside>
